<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <title>Esta imagen se nos ha desordenado - imgprivado</title>
  </head>
  <body>
    <div data-component="header"></div>
    <main class="not-found">
      <div class="container not-found__inner">
        <div class="image-mascot image-mascot--small" aria-hidden="true">
          <span class="image-mascot__sun"></span>
          <span class="image-mascot__mountain image-mascot__mountain--back"></span>
          <span class="image-mascot__mountain image-mascot__mountain--front"></span>
          <span class="image-mascot__eye image-mascot__eye--left"></span>
          <span class="image-mascot__eye image-mascot__eye--right"></span>
          <span class="image-mascot__smile" style="transform: rotate(180deg); top: 50%"></span>
        </div>
        <span class="pill">404</span>
        <h1>Esta imagen se nos ha desordenado</h1>
        <p>No encontramos la página, pero el inicio sigue en su sitio.</p>
        <a class="button button--primary" href="/">Volver a inicio</a>
      </div>
    </main>
    <div data-component="footer"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
